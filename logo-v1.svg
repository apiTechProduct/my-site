<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 288 56" fill="none"
     role="img" aria-label="The Human Stack — Pallavi Sher, Director PM">
  <title>The Human Stack</title>

  <!--
    Logo V1 — Mark + Wordmark
    Mark: circle (human) atop three decreasing bars (the stack)
    Wordmark: THE HUMAN STACK / PALLAVI SHER · DIRECTOR PM
    Amber (#C8924A) mark works on both light and dark backgrounds.
    Use currentColor for text — set parent color: #0C0F1E (light bg) or #F7F4EE (dark bg).
  -->

  <!-- ── ICON MARK ── -->
  <!-- Human: circle node -->
  <circle cx="24" cy="10" r="6.5" fill="#C8924A"/>

  <!-- Stack: three horizontal bars, decreasing width (centered pyramid) -->
  <rect x="4"  y="23" width="40" height="4.5" rx="2.25" fill="#C8924A"/>
  <rect x="9"  y="32" width="30" height="4.5" rx="2.25" fill="#C8924A"/>
  <rect x="14" y="41" width="20" height="4.5" rx="2.25" fill="#C8924A"/>

  <!-- ── DIVIDER ── -->
  <line x1="56" y1="7" x2="56" y2="49"
        stroke="currentColor" stroke-width="0.75" stroke-opacity="0.18"/>

  <!-- ── WORDMARK ── -->
  <text
    x="66" y="28"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-weight="600"
    font-size="15"
    letter-spacing="1.3"
    fill="currentColor">THE HUMAN STACK</text>

  <text
    x="67" y="43"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-weight="300"
    font-size="8.5"
    letter-spacing="1.9"
    fill="currentColor"
    opacity="0.52">PALLAVI SHER · DIRECTOR PM</text>

</svg>
